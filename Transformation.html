<canvas id="canvas" width="200" height="200"
style="width:500px; height:500px; border:1px solid #000; image-rendering: pixelated;">
</canvas>



<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(canvas.width, canvas.height);
const pixels = imageData.data; // Array of color [R,G,B,A, R,G,B,A, ...]

function putPixel(x, y, r, g, b, a = 255) {
  const idx = (y * canvas.width + x) * 4; // หา index แรกของ pixel (x,y)
  pixels[idx] = r;
  pixels[idx + 1] = g;
  pixels[idx + 2] = b;
  pixels[idx + 3] = a;
}

function drawLine(x1, y1, x2, y2, r, g, b, a = 255) {
  const dx = Math.abs(x2 - x1);
  const dy = Math.abs(y2 - y1);

  if(dx > dy) {
    const m = (y2 - y1) / (x2 - x1);
    const c = y1 - m * x1;
    for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
      const y = Math.round(m * x + c);
      putPixel(x, y, r, g, b, a);
    }
  } else {
    const m = (x2 - x1) / (y2 - y1);
    const c = x1 - m * y1;
    for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
      const x = Math.round(m * y + c);
      putPixel(x, y, r, g, b, a);
    }
  }
}

function drawRect(x1, y1, x2, y2, r, g, b, a = 255) {
  drawLine(x1, y1, x2, y1, r, g, b, a); // Top edge
  drawLine(x2, y1, x2, y2, r, g, b, a); // Right edge
  drawLine(x2, y2, x1, y2, r, g, b, a); // Bottom edge
  drawLine(x1, y2, x1, y1, r, g, b, a); // Left edge
}

function drawRectFilled(x1, y1, x2, y2, r, g, b, a = 255) {
  for (let y = y1; y <= y2; y++) {
    for (let x = x1; x <= x2; x++) {
      putPixel(x, y, r, g, b, a);
    }
  }
}

function drawRectGradient(x1, y1, x2, y2, r1, g1, b1, r2, g2, b2) {
  for (let y = y1; y <= y2; y++) {
    const t = (y - y1) / (y2 - y1);
    const r = Math.round(r1 * (1 - t) + r2 * t);
    const g = Math.round(g1 * (1 - t) + g2 * t);
    const b = Math.round(b1 * (1 - t) + b2 * t);
    for (let x = x1; x <= x2; x++) {
      putPixel(x, y, r, g, b);
    }
  }
}

function drawEllipse(cx, cy, rx, ry, r, g, b, a = 255) {
  for (let y = -ry; y <= ry; y++) {
    for (let x = -rx; x <= rx; x++) {
      if ((x * x) / (rx * rx) + (y * y) / (ry * ry) <= 1) {
        putPixel(cx + x, cy + y, r, g, b, a);
      }
    }
  }
}

function drawSprite(sprite, x, y, r, g, b, a = 255) {
  for (let j = 0; j < sprite.length; j++) {
    for (let i = 0; i < sprite[j].length; i++) {
      if (sprite[j][i] === 1) {
        putPixel(x + i, y + j, r, g, b, a);
      }
    }
  }
}
let scale = 1;
let mouseX = 0 ;
let mouseY = 0 ;
function drawSpriteRotationScale(sprite, x, y,degree,scaleX,scaleY, r, g, b, a = 255) {
  for (let j = 0; j < sprite.length; j++) {
    for (let i = 0; i < sprite[j].length; i++) {
      if (sprite[j][i] === 1) {
        const cx = i -(sprite[j].length/2);
        const cy = j -(sprite.length /2);
        const rad = degree * Math.PI / 180;
        const x_rotated = Math.round(cx * Math.cos(rad) - cy * Math.sin(rad));
        const y_rotated =  Math.round(cx * Math.sin(rad) + cy * Math.cos(rad));
        

        //scale
        const x_rotated_scaled = Math.round(x_rotated * scaleX);
        const y_rotated_scaled = Math.round(y_rotated * scaleY);
        //putPixel(x + x_rotated_scaled, y + y_rotated_scaled, r, g, b, a);
        drawEllipse (x + x_rotated_scaled, y + y_rotated_scaled, Math.round(scaleX), Math.round(scaleY), r, g, b, a);
      }
    }
  }
}

function drawSprite24Bit(sprite, x, y) {
  for (let j = 0; j < sprite.length; j++) {
    for (let i = 0; i < sprite[j].length; i++) {
      const color = sprite[j][i];

      if (color !== null) {
        const r = (color >> 16) & 255;
        const g = (color >> 8) & 255;
        const b = color & 255;
        putPixel(x + i, y + j, r, g, b);
      }
    }
  }
}

function toScaledMousePos(posX, posY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: Math.floor((posX - rect.left) * scaleX),
    y: Math.floor((posY - rect.top) * scaleY)
  };
}

   let isDragging = false;

canvas.addEventListener('mousedown',(event) => {

canvas.addEventListener('mouseup',(event) => {
    console.log('Mouse up',event.offsetX,event.offsetY);

})

canvas.addEventListener('mousemove', (event) =>{
    const {x,y} = toScaledMousePos(event.clientX,event.clientY);

    drawLine(PrevX,PrevY,x, y, r, g, b); 
  ctx.putImageData(imageData, 0, 0);

  PrevY = y;
    }

window.addEventListener('keydown', (event) => {

      if (event.key == '1') {
        r = 255 ; g = 0 ; b = 0;
      } else if (event.key == '2') {

      } else if (event.key == '3') {

})
